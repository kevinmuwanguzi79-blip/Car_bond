<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory — Sephoc Motors Uganda</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<script src="js/partials.js"></script>
<script>renderHeader("inventory.html");</script>

<section class="hero" style="padding-bottom:0;">
  <h1 style="font-size:2rem;">Full inventory</h1>
  <p class="sub">100+ vehicles — filter by brand, model, type, year, or price.</p>
</section>

<section class="section" style="padding-top:24px;">
  <div class="filter-bar" style="grid-template-columns:repeat(6,1fr);">
    <select id="f-brand" onchange="populateModelFilter('f-brand','f-model'); runFilters();"></select>
    <select id="f-model" onchange="runFilters();"><option value="">All models</option></select>
    <select id="f-type" onchange="runFilters();">
      <option value="">Any type</option>
      <option value="SUV">SUV</option>
      <option value="Sedan">Sedan</option>
      <option value="Pickup">Pickup</option>
      <option value="Van">Van</option>
      <option value="Hatchback">Hatchback</option>
      <option value="Wagon">Wagon</option>
    </select>
    <select id="f-year" onchange="runFilters();"></select>
    <select id="f-sort" onchange="runFilters();">
      <option value="">Sort: default</option>
      <option value="price_asc">Price: low to high</option>
      <option value="price_desc">Price: high to low</option>
    </select>
    <button onclick="document.getElementById('f-brand').value='';document.getElementById('f-model').value='';document.getElementById('f-type').value='';document.getElementById('f-year').value='';document.getElementById('f-sort').value='';runFilters();">Reset</button>
  </div>

  <div id="result-count" style="margin:20px 0 12px; color:var(--text-muted); font-size:0.9rem;"></div>
  <div id="inventory-grid" class="car-grid"></div>
</section>

<script src="js/cars-data.js"></script>
<script src="js/main.js"></script>
<script>
  populateBrandFilter("f-brand");
  populateYearFilter("f-year");

  function runFilters() {
    applyFilters({brandId:'f-brand',modelId:'f-model',typeId:'f-type',yearId:'f-year',sortId:'f-sort',targetId:'inventory-grid'});
    const count = document.querySelectorAll('#inventory-grid .car-card').length;
    document.getElementById('result-count').textContent = `${count} car${count === 1 ? '' : 's'} found`;
  }

  // pick up ?maxPrice= from homepage budget chips
  const params = new URLSearchParams(location.search);
  const maxPrice = params.get("maxPrice");
  let initial = [...CARS];
  if (maxPrice) initial = initial.filter(c => c.price <= Number(maxPrice));
  renderCars(initial, "inventory-grid");
  document.getElementById('result-count').textContent = `${initial.length} cars found`;
</script>

<script>renderWhatsAppFloat();</script>
<script>renderFooter();</script>
</body>
</html>
